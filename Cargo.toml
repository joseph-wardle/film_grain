[workspace]
members = [
    "crates/filmgrain-core",
    "crates/filmgrain-cli",
]
resolver = "2"

[workspace.package]
edition = "2024"
authors = ["Joseph Wardle <joseph.m.wardle@gmail.com>"]
license = "MIT OR Apache-2.0"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
